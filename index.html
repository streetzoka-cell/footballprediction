<!DOCTYPE html>
<html lang="en-KE">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <!-- Generic Title (React Helmet replaces this per page) -->
  <title>ZOKASCORE</title>

  <!-- Generic Description -->
  <meta
    name="description"
    content="Live football scores, football predictions, fixtures, standings and basketball updates."
  />

  <meta
    name="robots"
    content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1"
  />

  <meta
    name="googlebot"
    content="index,follow,max-snippet:-1,max-image-preview:large"
  />

  <meta name="theme-color" content="#05070a" />
  <meta name="color-scheme" content="dark" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- Icons -->
  <link rel="icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- Mobile -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ZOKASCORE" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://www.googletagmanager.com" />
  <link rel="preconnect" href="https://www.google-analytics.com" crossorigin />

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <!-- Preload -->
  <link rel="preload" href="/icons/icon-192.png" as="image" />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GZ2JTNKCCN"></script>

  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-GZ2JTNKCCN");
  </script>

  <!-- Loader -->
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #05070a;
      color: #fff;
      font-family: Inter, system-ui, sans-serif;
    }

    #root {
      min-height: 100vh;
    }

    #static-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #05070a;
      z-index: 9999;
      transition: opacity .3s ease;
    }

    .loader-ball {
      font-size: 60px;
      animation: ballSpin 1.2s ease-in-out infinite;
    }

    .loader-text {
      margin-top: 18px;
      color: #10b981;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 2px;
    }

    .loader-bar {
      width: 120px;
      height: 4px;
      margin-top: 16px;
      background: rgba(255,255,255,.12);
      border-radius: 999px;
      overflow: hidden;
    }

    .loader-bar-fill {
      width: 40%;
      height: 100%;
      background: #10b981;
      animation: loaderMove 1s linear infinite;
    }

    @keyframes ballSpin {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.1) rotate(12deg); }
    }

    @keyframes loaderMove {
      from { transform: translateX(-120%); }
      to { transform: translateX(320%); }
    }
  </style>
</head>

<body>

  <noscript>
    <div style="padding:40px;text-align:center;font-family:system-ui,sans-serif">
      <h1>JavaScript Required</h1>
      <p>ZOKASCORE requires JavaScript to display live football scores and predictions.</p>
    </div>
  </noscript>

  <div id="static-loader">
    <div class="loader-ball">⚽</div>
    <div class="loader-text">ZOKASCORE</div>

    <div class="loader-bar">
      <div class="loader-bar-fill"></div>
    </div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

</body>
</html>
